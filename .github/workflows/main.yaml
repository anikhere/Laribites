name: Laribites_workflow
on:
    push:
        branches: [master]
    pull_request:
        branches: [master]
jobs:
    build:
        name: continiuos-Integration
        runs-on: ubuntu-latest

        steps:
        - name: setting up requirements
          uses: actions/checkout@v4
        
        - name: building the docker image 
          run: docker build -t laribites .

        - name: setting the docker tag
          run: docker tag laribites dockanik/laribites:lari
        
        - name: logging docker
          uses: docker/login-action@v2
          with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASS }}


        
        - name: pushing the image 
          run:  docker push dockanik/laribites
        




